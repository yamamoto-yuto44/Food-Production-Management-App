<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
	<div layout:fragment="content">

		<div class="container mt-4">

			<div class="d-flex justify-content-between align-items-center mb-4">
				<h1 class="mb-0">発注管理</h1>
				<a th:href="@{/}" class="btn btn-outline-secondary">
					ホームに戻る
				</a>
			</div>

			<!-- エラー表示 -->
			<div th:if="${error}" class="alert alert-danger">
				<span th:text="${error}"></span>
			</div>

			<!-- 新規発注フォーム -->
			<div class="card mb-4">
				<div class="card-header">
					新規発注
				</div>
				<div class="card-body">

					<form th:action="@{/orders/create}" th:object="${orderForm}" method="post">

						<!-- 原料 -->
						<div class="mb-3">
							<label class="form-label">原料</label>
							<select th:field="*{materialId}" class="form-select">
								<option value="">選択してください</option>
								<option th:each="material : ${materials}" th:value="${material.id}"
									th:text="${material.materialName}">
								</option>
							</select>

							<div class="text-danger" th:if="${#fields.hasErrors('materialId')}"
								th:errors="*{materialId}">
							</div>
						</div>

						<!-- 数量 -->
						<div class="mb-3">
							<label class="form-label">数量</label>
							<input type="number" th:field="*{quantity}" min="1" step="1" max="1000"
								oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="form-control">
							<div class="text-danger" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}">
							</div>
						</div>

						<button type="submit" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">
							発注する
						</button>

					</form>

				</div>
			</div>

			<!-- 未入荷一覧 -->
			<div class="card">
				<div class="card-header">
					未入荷発注一覧
				</div>
				<div class="card-body">

					<table class="table table-bordered table-striped">

						<thead class="table-light">
							<tr>
								<th>原料名</th>
								<th>数量</th>
								<th>発注日</th>
								<th>処理</th>
							</tr>
						</thead>

						<tbody>

							<tr th:if="${#lists.isEmpty(orders)}">
								<td colspan="5" class="text-center">
									未入荷の発注はありません
								</td>
							</tr>

							<tr th:each="o : ${orders}">
								<td th:text="${o.material.materialName}"></td>
								<td th:text="${o.orderQuantity}"></td>
								<td th:text="${o.orderDate}"></td>
								<td>

									<form th:action="@{/orders/receive/{id}(id=${o.id})}" method="post"
										class="d-inline">
										<button type="submit" class="btn btn-success btn-sm">
											入荷処理
										</button>
									</form>

									<form th:action="@{/orders/cancel/{id}(id=${o.id})}" method="post" class="d-inline">
										<button type="submit" class="btn btn-danger btn-sm">
											キャンセル
										</button>
									</form>

								</td>
							</tr>

						</tbody>
					</table>

				</div>
			</div>

		</div>

	</div>
</body>

</html>
